<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>KTO Resells — Admin</title>
<style>
:root{
  --ink:#0e0e10; --soft:#5b5b62; --line:#e3e3e7; --bg:#f6f6f4; --card:#fff;
  --accent:#2f4cff; --ok:#0a7d33; --bad:#c01f2e; --radius:10px;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:inherit}
.wrap{max-width:1060px;margin:0 auto;padding:24px}
button{font:inherit;cursor:pointer}
input,textarea,select{font:inherit;color:var(--ink)}

/* ---- login ---- */
.login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.login-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:34px;width:100%;max-width:380px;box-shadow:0 12px 40px rgba(0,0,0,.06)}
.brand{font-weight:800;font-size:20px;letter-spacing:.02em;display:flex;align-items:center;gap:8px;margin-bottom:6px}
.brand .dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
.login-card h1{font-size:16px;margin:14px 0 4px}
.login-card p{font-size:13px;color:var(--soft);margin-bottom:18px}
.field{display:block;margin-bottom:14px}
.field span{display:block;font-size:12.5px;font-weight:600;color:var(--soft);margin-bottom:5px}
.field input,.field textarea,.field select{width:100%;border:1px solid var(--line);border-radius:8px;padding:10px 12px;background:#fff}
.field textarea{min-height:64px;resize:vertical}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:600;font-size:14px;padding:11px 18px;border-radius:8px;border:1px solid transparent;background:var(--ink);color:#fff}
.btn:hover{background:#26262b}
.btn.block{width:100%}
.btn.ghost{background:#fff;color:var(--ink);border-color:var(--line)}
.btn.ghost:hover{background:#f0f0f0}
.btn.danger{background:#fff;color:var(--bad);border-color:#f0c4c8}
.btn.danger:hover{background:#fdebed}
.msg{font-size:13px;margin-top:12px;min-height:18px}
.msg.err{color:var(--bad)} .msg.ok{color:var(--ok)}

/* ---- dashboard ---- */
.hidden{display:none !important}
.topbar{position:sticky;top:0;z-index:10;background:rgba(246,246,244,.9);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.topbar .wrap{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 24px}
.topbar .actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.count{font-size:13px;color:var(--soft)}
.savebar{font-size:13px}
h2.section{font-size:14px;color:var(--soft);font-weight:600;letter-spacing:.04em;text-transform:uppercase;margin:8px 0 14px}

.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-bottom:16px;display:grid;grid-template-columns:150px 1fr;gap:18px}
.card.off{opacity:.62}
.thumb{width:150px}
.thumb .img{width:150px;height:150px;border-radius:8px;border:1px solid var(--line);background:#f0f0ee center/cover no-repeat;display:flex;align-items:center;justify-content:center;color:var(--soft);font-size:12px;text-align:center;overflow:hidden}
.thumb .img img{width:100%;height:100%;object-fit:cover}
.thumb .up{margin-top:8px}
.thumb .up label{display:block;font-size:12px;font-weight:600;text-align:center;border:1px dashed var(--line);border-radius:8px;padding:8px;color:var(--soft);cursor:pointer}
.thumb .up label:hover{border-color:var(--ink);color:var(--ink)}
.thumb .up input{display:none}
.thumb .upmsg{font-size:11px;color:var(--soft);text-align:center;margin-top:5px;min-height:14px}
.gallery-thumbs{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.gallery-thumbs .gt{position:relative;width:42px;height:42px}
.gallery-thumbs .gt img{width:42px;height:42px;object-fit:cover;border-radius:6px;border:1px solid var(--line)}
.gallery-thumbs .gtx{position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;border:none;background:var(--ink);color:#fff;font-size:12px;line-height:1;cursor:pointer}
.fields{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fields .full{grid-column:1/-1}
.row-foot{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:4px;flex-wrap:wrap}
.toggle{display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:600}
.toggle input{width:18px;height:18px}
.pill{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;border:1px solid var(--line);color:var(--soft)}
.pill.live{background:#e9f7ee;color:var(--ok);border-color:#bfe6cc}
.pill.sold{background:#fdebed;color:var(--bad);border-color:#f0c4c8}
.pill.hidden-pill{background:#f1f1f1;color:var(--soft)}
.sizes-box{grid-column:1/-1;border:1px solid var(--line);border-radius:8px;padding:12px;background:#fafafa}
.sizes-box .hd{font-size:12.5px;font-weight:600;color:var(--soft);margin-bottom:8px}
.size-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.size-row input.sz{flex:1;border:1px solid var(--line);border-radius:7px;padding:8px 10px}
.size-row input.st{width:110px;border:1px solid var(--line);border-radius:7px;padding:8px 10px}
.size-row .rm{border:1px solid #f0c4c8;color:var(--bad);background:#fff;border-radius:7px;padding:7px 11px;font-weight:700}
.addsize{font-size:13px;font-weight:600;color:var(--accent);background:none;border:none;padding:4px 0}
@media(max-width:620px){
  .card{grid-template-columns:1fr}
  .thumb,.thumb .img{width:100%}
  .thumb .img{height:220px}
  .fields{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- ================= LOGIN ================= -->
<div id="login" class="login">
  <form class="login-card" id="loginForm">
    <div class="brand"><span class="dot"></span>KTO Resells</div>
    <h1>Admin sign in</h1>
    <p>Private dashboard. Enter your password to manage the shop.</p>
    <label class="field">
      <span>Password</span>
      <input type="password" id="pw" autocomplete="current-password" required />
    </label>
    <button class="btn block" type="submit" id="loginBtn">Sign in</button>
    <div class="msg err" id="loginMsg"></div>
  </form>
</div>

<!-- ================= DASHBOARD ================= -->
<div id="dash" class="hidden">
  <div class="topbar">
    <div class="wrap">
      <div class="brand"><span class="dot"></span>KTO Admin</div>
      <div class="actions">
        <button class="btn ghost" id="tabInv">Inventory</button>
        <button class="btn ghost" id="tabOrders">Orders</button>
        <button class="btn ghost" id="logoutBtn">Log out</button>
      </div>
    </div>
  </div>

  <!-- INVENTORY view -->
  <div class="wrap" id="invView">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:10px">
      <span class="count" id="count"></span>
      <div style="display:flex;gap:10px">
        <button class="btn ghost" id="addBtn">+ Add pair</button>
        <button class="btn" id="saveBtn">Save all changes</button>
      </div>
    </div>
    <div class="savebar msg" id="saveMsg"></div>
    <div id="list"></div>
  </div>

  <!-- ORDERS view -->
  <div class="wrap hidden" id="ordersView">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <span class="count" id="ordersCount"></span>
      <button class="btn ghost" id="refreshOrders">Refresh</button>
    </div>
    <div id="orders"></div>
  </div>
</div>

<script>
/* ============ config ============ */
const API = "https://kto-checkout.tochiorji4.workers.dev";
const TKEY = "kto_admin_token";

const $ = s => document.querySelector(s);
const loginEl=$("#login"), dashEl=$("#dash"), listEl=$("#list");
let products = [];

/* ============ auth ============ */
function token(){ return sessionStorage.getItem(TKEY) || ""; }
function authHeaders(extra){ return Object.assign({ "Authorization":"Bearer "+token() }, extra||{}); }

$("#loginForm").addEventListener("submit", async e => {
  e.preventDefault();
  const btn=$("#loginBtn"), msg=$("#loginMsg");
  msg.textContent=""; btn.disabled=true; btn.textContent="Signing in…";
  try{
    const r = await fetch(API+"/admin/login",{ method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({password:$("#pw").value}) });
    const d = await r.json();
    if(!r.ok) throw new Error(d.error||"Login failed");
    sessionStorage.setItem(TKEY, d.token);
    $("#pw").value="";
    showDash();
  }catch(err){ msg.textContent=err.message; }
  finally{ btn.disabled=false; btn.textContent="Sign in"; }
});

$("#logoutBtn").addEventListener("click", ()=>{ sessionStorage.removeItem(TKEY); location.reload(); });

/* ============ load + render ============ */
async function showDash(){
  loginEl.classList.add("hidden"); dashEl.classList.remove("hidden");
  await loadProducts();
}
async function loadProducts(){
  const r = await fetch(API+"/admin/products",{ headers:authHeaders() });
  if(r.status===401){ sessionStorage.removeItem(TKEY); location.reload(); return; }
  const d = await r.json();
  products = (d.products||[]).map(normalize);
  render();
}
function normalize(p){
  let sizes = Array.isArray(p.sizes) ? p.sizes.slice() : null;
  if(!sizes) sizes = [{ size:p.size||"", stock:p.stock??1 }];   // migrate old single-size
  sizes = sizes.map(s=>({ size:s.size||"", stock:s.stock??0 }));
  if(!sizes.length) sizes = [{ size:"", stock:1 }];
  let images = Array.isArray(p.images) && p.images.length ? p.images.slice() : (p.img ? [p.img] : []);
  return { id:p.id||"", brand:p.brand||"", name:p.name||"", desc:p.desc||"",
           cond:p.cond||"", price:p.price??0, was:p.was??"", images,
           active:p.active!==false, sizes };
}
function imgSrc(img){
  if(!img) return "";
  if(/^https?:\/\//.test(img)) return img;
  return "https://ktoresell.shop/"+img.replace(/^\//,"");
}
function totalStock(p){ return (p.sizes||[]).reduce((n,s)=>n+(Number(s.stock)||0),0); }
function statusPill(p){
  if(!p.active) return '<span class="pill hidden-pill">Hidden</span>';
  if(totalStock(p)<=0) return '<span class="pill sold">Sold out</span>';
  return '<span class="pill live">Live</span>';
}

function render(){
  $("#count").textContent = products.length + " pair" + (products.length===1?"":"s");
  listEl.innerHTML = products.map((p,i)=>`
    <div class="card ${p.active?'':'off'}" data-i="${i}">
      <div class="thumb">
        <div class="img">${p.images[0]?`<img src="${imgSrc(p.images[0])}" alt="">`:'No image'}</div>
        <div class="gallery-thumbs">
          ${p.images.map((u,gi)=>`<span class="gt"><img src="${imgSrc(u)}" alt=""><button type="button" class="gtx" data-rmimg="${gi}" title="Remove">×</button></span>`).join("")}
        </div>
        <div class="up">
          <label>+ Add photo<input type="file" accept="image/*" multiple data-up="${i}"></label>
          <div class="upmsg" data-upmsg="${i}"></div>
        </div>
      </div>
      <div class="fields">
        <label class="field"><span>Brand</span><input data-f="brand" value="${esc(p.brand)}"></label>
        <label class="field"><span>Name</span><input data-f="name" value="${esc(p.name)}"></label>
        <label class="field full"><span>Description</span><textarea data-f="desc">${esc(p.desc)}</textarea></label>
        <label class="field"><span>Condition</span><input data-f="cond" value="${esc(p.cond)}"></label>
        <label class="field"><span>Price (USD)</span><input data-f="price" type="number" min="0" value="${esc(p.price)}"></label>
        <label class="field"><span>Was / retail (optional)</span><input data-f="was" type="number" min="0" value="${esc(p.was)}"></label>
        <label class="field"><span>Product ID (don't change once live)</span><input data-f="id" value="${esc(p.id)}"></label>
        <div class="sizes-box">
          <div class="hd">Sizes &amp; stock (stock 0 = that size shows sold out)</div>
          ${p.sizes.map((s,si)=>`
            <div class="size-row" data-si="${si}">
              <input class="sz" data-sf="size" placeholder="e.g. US 9" value="${esc(s.size)}">
              <input class="st" data-sf="stock" type="number" min="0" placeholder="stock" value="${esc(s.stock)}">
              <button type="button" class="rm" data-rmsize="${si}">Remove</button>
            </div>`).join("")}
          <button type="button" class="addsize" data-addsize="${i}">+ Add size</button>
        </div>
        <div class="row-foot">
          <label class="toggle"><input type="checkbox" data-f="active" ${p.active?'checked':''}> Show on store</label>
          <div style="display:flex;gap:10px;align-items:center">
            ${statusPill(p)}
            <button class="btn danger" data-del="${i}">Delete</button>
          </div>
        </div>
      </div>
    </div>`).join("");
}
function esc(v){ return String(v??"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

/* ============ edits (event delegation) ============ */
listEl.addEventListener("input", e=>{
  const card = e.target.closest(".card"); if(!card) return;
  const i = +card.dataset.i;
  const sf = e.target.dataset.sf;            // size-row field
  if(sf){
    const si = +e.target.closest(".size-row").dataset.si;
    products[i].sizes[si][sf] = e.target.value;
    return;
  }
  const f = e.target.dataset.f; if(!f) return;
  products[i][f] = e.target.type==="checkbox" ? e.target.checked : e.target.value;
});
listEl.addEventListener("change", e=>{
  if(e.target.dataset.f==="active"){ render(); }   // refresh pill/opacity
  if(e.target.dataset.up!==undefined) uploadImage(e.target);
});
listEl.addEventListener("click", e=>{
  const card = e.target.closest(".card"); const i = card ? +card.dataset.i : -1;
  if(e.target.dataset.del!==undefined){
    if(confirm("Delete this pair?")){ products.splice(+e.target.dataset.del,1); render(); }
  } else if(e.target.dataset.rmimg!==undefined && i>=0){
    products[i].images.splice(+e.target.dataset.rmimg,1); render();
  } else if(e.target.dataset.addsize!==undefined){
    products[i].sizes.push({ size:"", stock:1 }); render();
  } else if(e.target.dataset.rmsize!==undefined){
    const si=+e.target.dataset.rmsize;
    products[i].sizes.splice(si,1);
    if(!products[i].sizes.length) products[i].sizes.push({size:"",stock:0});
    render();
  }
});

async function uploadImage(input){
  const i = +input.dataset.up;
  const files = [...input.files]; if(!files.length) return;
  const msg = listEl.querySelector(`[data-upmsg="${i}"]`);
  try{
    for(let k=0;k<files.length;k++){
      msg.textContent = `Uploading ${k+1}/${files.length}…`;
      const fd = new FormData(); fd.append("file", files[k]);
      const r = await fetch(API+"/admin/upload",{ method:"POST", headers:authHeaders(), body:fd });
      const d = await r.json();
      if(!r.ok) throw new Error(d.error||"Upload failed");
      products[i].images.push(d.url);
    }
    render();
  }catch(err){ msg.textContent = err.message; }
}

/* ============ add / save ============ */
$("#addBtn").addEventListener("click", ()=>{
  products.unshift(normalize({ id:"pair-"+Math.random().toString(36).slice(2,7), brand:"", name:"New pair", desc:"", cond:"Deadstock", price:0, was:"", img:"", active:false, sizes:[{size:"",stock:1}] }));
  render();
  window.scrollTo({top:0,behavior:"smooth"});
});

$("#saveBtn").addEventListener("click", async ()=>{
  const btn=$("#saveBtn"), msg=$("#saveMsg");
  msg.className="savebar msg"; msg.textContent="";
  btn.disabled=true; btn.textContent="Saving…";
  try{
    const payload = { products: products.map(p=>({
      id:p.id, brand:p.brand, name:p.name, desc:p.desc, cond:p.cond,
      price:Number(p.price)||0, was:p.was===""||p.was==null?null:Number(p.was),
      images:(p.images||[]).filter(Boolean), active:!!p.active,
      sizes:(p.sizes||[]).map(s=>({ size:String(s.size||"").trim(), stock:Number(s.stock)||0 })).filter(s=>s.size)
    })) };
    const r = await fetch(API+"/admin/save",{ method:"POST", headers:authHeaders({"Content-Type":"application/json"}), body:JSON.stringify(payload) });
    const d = await r.json();
    if(!r.ok) throw new Error(d.error||"Save failed");
    msg.className="savebar msg ok"; msg.textContent="Saved ✓ — your store is updated ("+d.count+" pairs).";
    await loadProducts();
  }catch(err){ msg.className="savebar msg err"; msg.textContent=err.message; }
  finally{ btn.disabled=false; btn.textContent="Save all changes"; }
});

/* ============ orders ============ */
const invView=$("#invView"), ordersView=$("#ordersView"), ordersEl=$("#orders");
$("#tabInv").addEventListener("click", ()=>{ invView.classList.remove("hidden"); ordersView.classList.add("hidden"); });
$("#tabOrders").addEventListener("click", ()=>{ invView.classList.add("hidden"); ordersView.classList.remove("hidden"); loadOrders(); });
$("#refreshOrders").addEventListener("click", loadOrders);

async function loadOrders(){
  ordersEl.innerHTML = `<p style="color:var(--soft)">Loading orders…</p>`;
  const r = await fetch(API+"/admin/orders",{ headers:authHeaders() });
  if(r.status===401){ sessionStorage.removeItem(TKEY); location.reload(); return; }
  const d = await r.json();
  const orders = d.orders||[];
  $("#ordersCount").textContent = orders.length + " order" + (orders.length===1?"":"s");
  if(!orders.length){ ordersEl.innerHTML = `<p style="color:var(--soft)">No orders yet. They'll appear here automatically after a sale.</p>`; return; }
  ordersEl.innerHTML = orders.map(o=>{
    const a=o.address||{};
    const addr=[a.line1,a.line2,a.city,a.state,a.postal_code,a.country].filter(Boolean).join(", ");
    const ship = (o.shippo||"").startsWith("created") ? '<span class="pill live">In Shippo</span>'
               : (o.shippo||"").startsWith("error") ? '<span class="pill sold">Shippo error</span>'
               : (o.shippo==="no-token") ? '<span class="pill hidden-pill">Shippo off</span>'
               : '<span class="pill hidden-pill">'+esc(o.shippo||'')+'</span>';
    return `<div class="card" style="grid-template-columns:1fr">
      <div>
        <div style="display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;align-items:center">
          <strong style="font-size:15px">${esc(o.item_name||'Order')}</strong>
          <span style="font-weight:800">$${esc(o.amount!=null?o.amount:'?')}</span>
        </div>
        <div style="font-size:13px;color:var(--soft);margin:6px 0 12px">${new Date(o.date).toLocaleString()} ${ship}</div>
        <div class="fields">
          <div class="field"><span>Customer</span><div>${esc(o.customer_name||'-')}</div></div>
          <div class="field"><span>Email</span><div>${esc(o.email||'-')}</div></div>
          <div class="field"><span>Phone</span><div>${esc(o.phone||'-')}</div></div>
          <div class="field full"><span>Ship to</span><div>${esc(addr||'-')}</div></div>
        </div>
      </div>
    </div>`;
  }).join("");
}

/* ============ boot ============ */
if(token()) showDash();
</script>
</body>
</html>
